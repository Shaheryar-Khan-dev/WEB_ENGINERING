<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form</title>
    <link rel="stylesheet" href="hr.css">
</head>
<body>

<div class="container">
    <h2>Registration Form</h2>

    <form>
        <div class="form-group">
            <label>Username:</label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Password:</label>
            <input type="password">
        </div>

        <div class="form-group">
            <label>City of Employment:</label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Web server:</label>
            <select>
                <option>-- Choose a server --</option>
                <option>Server 1</option>
                <option>Server 2</option>
            </select>
        </div>

        <div class="form-group role">
            <label>Please specify your role:</label>
            <div>
                <input type="radio" name="role"> Admin <br>
                <input type="radio" name="role"> Engineer <br>
                <input type="radio" name="role"> Manager <br>
                <input type="radio" name="role"> Guest
            </div>
        </div>

        <div class="buttons">
            <button type="submit">Submit</button>
        </div>

    </form>
</div>

</body>
</html>
